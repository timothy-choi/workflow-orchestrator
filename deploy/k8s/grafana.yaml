apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: default
  labels:
    app: grafana
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.default.svc.cluster.local:9090
        isDefault: true
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: default
  labels:
    app: grafana
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: workflow-orchestrator
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-workflow
  namespace: default
  labels:
    app: grafana
data:
  workflow-overview.json: '{"title": "Workflow orchestrator", "uid": "workflow-orchestrator-overview", "schemaVersion": 39, "version": 1, "timezone": "browser", "refresh": "30s", "time": {"from": "now-6h", "to": "now"}, "panels": [{"type": "timeseries", "title": "Executions created / succeeded / failed (rate)", "gridPos": {"h": 8, "w": 24, "x": 0, "y": 0}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"expr": "sum(rate(workflow_executions_total[$__rate_interval]))", "legendFormat": "created", "refId": "A"}, {"expr": "sum(rate(workflow_executions_succeeded_total[$__rate_interval]))", "legendFormat": "succeeded", "refId": "B"}, {"expr": "sum(rate(workflow_executions_failed_total[$__rate_interval]))", "legendFormat": "failed", "refId": "C"}, {"expr": "sum(rate(workflow_executions_cancelled_total[$__rate_interval]))", "legendFormat": "cancelled", "refId": "D"}], "fieldConfig": {"defaults": {"unit": "ops"}, "overrides": []}}, {"type": "stat", "title": "Running executions", "gridPos": {"h": 5, "w": 6, "x": 0, "y": 8}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"expr": "workflow_executions_running", "legendFormat": "running", "refId": "A"}]}, {"type": "stat", "title": "Paused executions", "gridPos": {"h": 5, "w": 6, "x": 6, "y": 8}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"expr": "workflow_executions_paused_current", "legendFormat": "paused", "refId": "A"}]}, {"type": "stat", "title": "Failed steps (current)", "gridPos": {"h": 5, "w": 6, "x": 12, "y": 8}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"expr": "workflow_steps_failed_current", "legendFormat": "failed", "refId": "A"}]}, {"type": "stat", "title": "Pending steps", "gridPos": {"h": 5, "w": 6, "x": 18, "y": 8}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"expr": "workflow_steps_pending", "legendFormat": "pending", "refId": "A"}]}, {"type": "timeseries", "title": "Callbacks received (rate)", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 13}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"expr": "sum(rate(workflow_callbacks_received_total[$__rate_interval])) by (status)", "legendFormat": "{{status}}", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "ops"}, "overrides": []}}, {"type": "timeseries", "title": "Kubernetes jobs created / deleted (rate)", "gridPos": {"h": 8, "w": 12, "x": 12, "y": 13}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"expr": "sum(rate(workflow_kubernetes_jobs_total[$__rate_interval]))", "legendFormat": "created", "refId": "A"}, {"expr": "sum(rate(workflow_kubernetes_jobs_deleted_total[$__rate_interval]))", "legendFormat": "deleted", "refId": "B"}], "fieldConfig": {"defaults": {"unit": "ops"}, "overrides": []}}, {"type": "timeseries", "title": "Execution duration (seconds, sum rate)", "gridPos": {"h": 8, "w": 24, "x": 0, "y": 21}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"expr": "sum(rate(workflow_execution_duration_seconds_sum[$__rate_interval])) / sum(rate(workflow_execution_duration_seconds_count[$__rate_interval]))", "legendFormat": "avg duration", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "s"}, "overrides": []}}, {"type": "timeseries", "title": "Step failures - terminal (rate)", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 29}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"expr": "sum(rate(workflow_steps_failed_total[$__rate_interval]))", "legendFormat": "terminal failures", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "ops"}, "overrides": []}}]}'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: default
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.3.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: grafana-dashboard-workflow
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: default
  labels:
    app: grafana
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
