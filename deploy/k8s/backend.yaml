apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: default
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: workflow-orchestrator-backend
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z postgres 5432; do sleep 1; done"]
      containers:
        - name: backend
          image: workflow-backend:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SERVER_PORT
              value: "8080"
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/workflow_orchestrator
            - name: SPRING_DATASOURCE_USERNAME
              value: postgres
            - name: SPRING_DATASOURCE_PASSWORD
              value: postgres
            - name: ORCHESTRATOR_EXECUTION_MODE
              value: kubernetes
            - name: ORCHESTRATOR_CALLBACK_BASE_URL
              value: http://backend:8080
            - name: ORCHESTRATOR_CALLBACK_TOKEN
              value: dev-callback-token
            - name: ORCHESTRATOR_KUBERNETES_NAMESPACE
              value: default
            - name: ORCHESTRATOR_KUBERNETES_WORKER_IMAGE
              value: workflow-python-worker:local
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: default
  labels:
    app: backend
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
