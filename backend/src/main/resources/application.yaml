spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/workflow_orchestrator
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true

server:
  port: 8082

# Local scheduler (see WorkflowScheduler, LocalStepRunner). Tests set workflow.scheduler.tick-enabled=false.
workflow:
  scheduler:
    tick-enabled: true
    fixed-delay-ms: 3000
    initial-delay-ms: 1500
    retry-backoff-base-seconds: 10
    reconcile-delay-ms: 10000

orchestrator:
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173
  execution:
    mode: local
  callback:
    base-url: http://localhost:8082
    token: dev-token-change-me
  kubernetes:
    namespace: default
    worker-image: workflow-python-worker:local

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] %logger{36} executionId=%X{executionId:-} stepExecutionId=%X{stepExecutionId:-} workflowId=%X{workflowId:-} k8sJobName=%X{k8sJobName:-} eventType=%X{eventType:-} - %msg%n"